<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<title>Data Browser</title>
<style>
  :root {
    --header-bg: var(--vscode-editorGroupHeader-tabsBackground, #252526);
    --header-fg: var(--vscode-foreground, #ccc);
    --cell-bg: var(--vscode-editor-background, #1e1e1e);
    --cell-fg: var(--vscode-editor-foreground, #d4d4d4);
    --border: var(--vscode-editorGroup-border, #444);
    --index-bg: var(--vscode-editorLineNumber-foreground, #858585);
    --input-bg: var(--vscode-input-background, #3c3c3c);
    --input-fg: var(--vscode-input-foreground, #cccccc);
    --btn-bg: var(--vscode-button-secondaryBackground, #3a3d41);
    --btn-fg: var(--vscode-button-secondaryForeground, #cccccc);
    --btn-active-bg: var(--vscode-button-background, #0e639c);
    --btn-active-fg: var(--vscode-button-foreground, #fff);
    --row-h: 22px;
    --col-w: 96px;
    --idx-col-w: 56px;
    --idx-row-h: 22px;
    --obj-list-font-size: 13px;
    --obj-type-font-size: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--vscode-font-family, monospace); font-size: 12px;
         background: var(--vscode-editor-background, #1e1e1e);
         color: var(--cell-fg); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* ── Toolbar (row 2: info/range/colors) ── */
  #toolbar { display: flex; align-items: center; gap: 8px; padding: 2px 8px;
             background: var(--header-bg); border-bottom: 1px solid var(--border);
             min-height: 26px; flex-shrink: 0; }
  #info-label {
    font-size: 13px;
    color: var(--index-bg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  #status { display: none; }
  .btn-group { display: inline-flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .btn-group button {
    width: 24px;
    min-width: 24px;
    height: 20px;
    padding: 0;
    border: none;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--btn-fg);
    font-size: 12px;
    line-height: 1;
  }
  .btn-group button.active { background: var(--btn-active-bg); color: var(--btn-active-fg); }
  .btn-group button:hover:not(.active) { filter: brightness(1.3); }

  #color-btns button {
    width: 28px;
    min-width: 28px;
    padding: 2px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #color-btns button.active {
    background: var(--btn-bg);
    outline: 1px solid var(--btn-active-bg);
    outline-offset: -1px;
  }
  #color-btns svg {
    display: block;
    fill: none;
  }
  /* ── Address / slice bar (row 1: expression) ── */
  #addr-row { display: flex; align-items: center; gap: 4px; padding: 2px 8px;
              border-bottom: 1px solid var(--border); min-height: 30px; flex-shrink: 0;
              background: var(--header-bg); }
  .btn-nav { padding: 0 4px; border: none; background: transparent; cursor: pointer;
             color: var(--btn-fg); font-size: 18px; line-height: 1;
             flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .btn-nav:hover:not(:disabled) { color: var(--input-fg); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  #btn-reload { padding: 1px 7px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer;
                background: var(--btn-bg); color: var(--btn-fg); font-size: 13px; line-height: 1.3;
                flex-shrink: 0; }
  #btn-reload:hover { filter: brightness(1.3); }
  #expr-input-wrap { position: relative; flex: 1; min-width: 0; }
  #addr-input { width: 100%; background: var(--input-bg); color: var(--input-fg);
                border: 1px solid var(--border); padding: 1px 6px;
                font-family: var(--vscode-editor-font-family, var(--vscode-font-family, monospace));
                font-size: 12px; min-width: 0; }
  #expr-input-wrap.has-history #addr-input { padding-right: 24px; }
  #addr-input:focus { outline: 1px solid var(--btn-active-bg); }
  #expr-history-btn {
    display: none;
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--index-bg);
    cursor: pointer;
    padding: 0;
    opacity: 0.9;
  }
  #expr-input-wrap.has-history #expr-history-btn { display: flex; }
  #expr-history-btn:hover { color: var(--input-fg); opacity: 1; }
  #expr-history-menu {
    display: none;
    position: absolute;
    top: calc(100% + 2px);
    right: 0;
    left: 0;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    background: var(--input-bg);
    z-index: 30;
  }
  #expr-history-menu.open { display: block; }
  .expr-history-item {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
    color: var(--input-fg);
    text-align: left;
    padding: 4px 6px;
    font-family: monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .expr-history-item:last-child { border-bottom: none; }
  .expr-history-item:hover { background: var(--btn-active-bg); color: var(--btn-active-fg); }
  #range-info { font-size: 10px; color: var(--index-bg); white-space: nowrap; margin-left: auto; }

  #mode-toggle {
    margin-left: auto;
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #mode-toggle button {
    min-width: 44px;
    height: 20px;
    border: none;
    padding: 0 6px;
    background: var(--btn-bg);
    color: var(--btn-fg);
    cursor: pointer;
    font-size: 11px;
  }
  #mode-toggle button.active { background: var(--btn-active-bg); color: var(--btn-active-fg); }
  #mode-toggle button:hover:not(.active) { filter: brightness(1.3); }

  /* ── Dim selectors (for ndim > 2) — hidden, replaced by slice suffix + buttons ── */
  #dim-row { display: none !important; }

  /* ── Slice index up/down buttons ── */
  #slice-btns { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .slice-btn-pair { display: flex; flex-direction: column; gap: 1px; }
  .slice-btn { padding: 0 3px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer;
               background: var(--btn-bg); color: var(--btn-fg); font-size: 9px; line-height: 1;
               height: 11px; min-width: 16px; display: flex; align-items: center; justify-content: center; }
  .slice-btn:hover { filter: brightness(1.4); }

  /* ── Error state ── */
  #viewer-error {
    display: none;
    margin: 10px 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--header-bg);
    color: var(--cell-fg);
    line-height: 1.45;
    white-space: normal;
  }

  #function-host {
    display: none;
    padding: 16px;
    flex-direction: column;
    flex: 1;
    overflow: auto;
    background: var(--cell-bg);
    line-height: 1.5;
  }
  #function-params {
    font-family: monospace;
    font-size: 14px;
    color: #dcdcaa;
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
  }
  #function-doc {
    font-family: sans-serif;
    font-size: 13px;
    color: var(--cell-fg);
    padding: 8px 0;
    background: transparent;
  }
  #function-doc p {
    margin: 3px 0;
    line-height: 1.5;
  }
  #function-doc .doc-section {
    font-weight: bold;
    font-size: 12px;
    margin: 10px 0 3px;
    color: var(--vscode-symbolIcon-functionForeground, #dcdcaa);
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #function-doc pre {
    background: rgba(128, 128, 128, 0.1);
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 4px 0;
    white-space: pre;
  }
  #function-doc code {
    font-family: var(--vscode-editor-font-family, monospace);
    background: rgba(128, 128, 128, 0.1);
    padding: 2px 4px;
    border-radius: 3px;
  }
  #function-doc pre code {
    background: none;
    padding: 0;
    font-size: 12px;
  }
  /* Python syntax highlighting */
  .py-kw     { color: var(--vscode-symbolIcon-keywordForeground,  #569cd6); }
  .py-str    { color: #ce9178; }
  .py-comment{ color: #6a9955; font-style: italic; }
  .py-num    { color: #b5cea8; }
  .py-prompt { color: #858585; user-select: none; }
  body.vscode-light .py-kw      { color: #0000ff; }
  body.vscode-light .py-str     { color: #a31515; }
  body.vscode-light .py-comment { color: #008000; }
  body.vscode-light .py-num     { color: #098658; }
  body.vscode-light .py-prompt  { color: #999; }

  #tree-host,
  #scalar-host {
    display: none;
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--cell-bg);
  }

  .tree-row {
    display: flex;
    align-items: center;
    min-height: var(--row-h);
    padding: 0 6px;
    gap: 6px;
    font-size: var(--obj-list-font-size);
  }
  .tree-row.even { background: rgba(128, 128, 128, 0.03); }
  .tree-row.odd  { background: transparent; }
  .tree-row:hover { background: rgba(128, 128, 128, 0.08); }

  .tree-row.sticky {
    position: sticky;
    z-index: 7;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }
  .tree-indent { width: 14px; flex-shrink: 0; }
  .tree-indent:hover {
    background: rgba(128, 128, 128, 0.2);
  }
  .tree-expand {
    width: 24px;
    height: 24px;
    color: var(--btn-fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    transition: transform 0.1s ease;
    border-radius: 2px;
  }
  .tree-expand:hover {
    background: rgba(128, 128, 128, 0.4);
  }
  .tree-expand.placeholder {
    visibility: hidden;
    pointer-events: none;
  }
  .tree-key {
    color: #3794ff; /* Decent blue for keys */
    cursor: pointer;
    flex-shrink: 0;
  }
  .tree-type {
    color: #4ec9b0; /* default class/type color */
    font-size: var(--obj-type-font-size);
    flex-shrink: 0;
    opacity: 0.85;
  }
  .tree-type.type-str { color: #ce9178; }
  .tree-type.type-number { color: #b5cea8; }
  .tree-type.type-bool { color: #569cd6; }
  .tree-type.type-group { color: var(--index-bg); font-style: italic; }
  .tree-repr {
    color: var(--cell-fg);
    opacity: 0.9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1;
  }
  .tree-repr.string { color: #ce9178; } /* String color */
  .tree-repr.number { color: #b5cea8; } /* Number color */
  .tree-repr.bool   { color: #569cd6; } /* Keyword color */

  /* Improve contrast for light themes where dark-theme pastels are too faint. */
  body.vscode-light .tree-type {
    color: #0b6a5d;
    opacity: 1;
  }
  body.vscode-light .tree-type.type-str { color: #a8432a; }
  body.vscode-light .tree-type.type-number { color: #2f6f28; }
  body.vscode-light .tree-type.type-bool { color: #24599b; }

  body.vscode-light .col-idx-cell,
  body.vscode-light .row-idx-cell {
    color: var(--vscode-editorLineNumber-activeForeground, #4f4f4f);
  }

  body.vscode-light #info-label,
  body.vscode-light #range-info {
    color: var(--vscode-editor-foreground, #333333);
  }

  .tree-load-more {
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--btn-fg);
    padding: 2px 8px;
    margin: 8px;
    border-radius: 3px;
    cursor: pointer;
  }

  #scalar-host { padding: 12px; display: flex; flex-direction: column; flex: 1; height: 100%; box-sizing: border-box; }
  #scalar-type { color: var(--index-bg); margin-bottom: 6px; flex-shrink: 0; }
  #scalar-input {
    width: 100%;
    background: var(--input-bg);
    color: var(--input-fg);
    border: 1px solid var(--border);
    padding: 6px 8px;
    font-family: var(--vscode-editor-font-family, var(--vscode-font-family, monospace));
    font-size: 12px;
    resize: none;
    box-sizing: border-box;
  }

  #scalar-input.scalar-string {
    flex: 1;
    min-height: 100px;
  }

  #scalar-input.scalar-oneline {
    flex: none;
    height: 32px;
    line-height: 18px;
    white-space: nowrap;
    overflow-x: auto;
  }

  #scalar-input.ok { outline: 1px solid #4caf50 !important; outline-offset: -1px; }
  #scalar-input.err { outline: 1px solid #f44336 !important; outline-offset: -1px; }
  #scalar-input:focus { outline: 1px solid var(--btn-active-bg); outline-offset: -1px; }
  #scalar-input[readonly] { cursor: default; }
  #scalar-input[readonly]:focus { outline: 1px solid transparent; }
  #scalar-input.changed { outline: 1px solid #e38e1b !important; outline-offset: -1px; }
  #scalar-input.changed:focus { outline: 1px solid #e38e1b !important; outline-offset: -1px; }
  #scalar-help { color: var(--index-bg); font-size: 11px; margin-top: 6px; flex-shrink: 0; }
  /* ── Bool toggle switch ── */
  #scalar-bool-row { display: none; align-items: center; gap: 12px; flex-shrink: 0; }
  .bool-toggle-label { font-size: 13px; min-width: 42px; font-family: var(--vscode-editor-font-family, monospace); color: var(--cell-fg); }
  .bool-toggle-wrap { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
  .bool-toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
  .bool-toggle-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 18px; transition: background 0.18s, border-color 0.18s;
  }
  .bool-toggle-slider::before {
    content: ''; position: absolute;
    width: 12px; height: 12px; left: 2px; top: 2px;
    background: var(--btn-fg); border-radius: 50%;
    transition: transform 0.18s, background 0.18s;
  }
  .bool-toggle-wrap input:checked + .bool-toggle-slider { background: var(--btn-active-bg); border-color: var(--btn-active-bg); }
  .bool-toggle-wrap input:checked + .bool-toggle-slider::before { transform: translateX(16px); background: #fff; }
  #scalar-dt-picker {
    flex-shrink: 0;
    width: 280px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  /* ── Main scroll container ── */
  #scroll-host { flex: 1; overflow: auto; position: relative; outline: none; }
  #phantom { position: absolute; top: 0; left: 0; pointer-events: none; }

  /* ── Sticky rendering layer ── */
  #grid-wrap { position: sticky; top: 0; left: 0; display: inline-flex; flex-direction: column;
               background: var(--cell-bg); }

  /* Column index row */
  #col-idx-row { display: flex; position: sticky; top: 0; z-index: 10; }
  .col-idx-cell { width: var(--col-w); min-width: var(--col-w); height: var(--idx-row-h);
                  line-height: var(--idx-row-h); text-align: center; font-size: 10px;
                  color: var(--index-bg); background: var(--header-bg);
                  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
                  overflow: hidden; white-space: nowrap; flex-shrink: 0; }
  .corner-cell { width: var(--idx-col-w); min-width: var(--idx-col-w); height: var(--idx-row-h);
                 background: var(--header-bg); border-bottom: 1px solid var(--border);
                 border-right: 1px solid var(--border); flex-shrink: 0; }

  /* Data rows */
  .data-row { display: flex; }
  .row-idx-cell { width: var(--idx-col-w); min-width: var(--idx-col-w); height: var(--row-h);
                  line-height: var(--row-h); text-align: right; padding-right: 6px;
                  font-size: 10px; color: var(--index-bg); background: var(--header-bg);
                  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
                  position: sticky; left: 0; z-index: 5; flex-shrink: 0; }
  .data-cell { width: var(--col-w); min-width: var(--col-w); height: var(--row-h);
               line-height: var(--row-h); text-align: right; padding: 0 6px;
               border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
               overflow: hidden; white-space: nowrap; cursor: default; flex-shrink: 0;
               user-select: none; }
  .data-cell.loading { color: var(--index-bg); }
  .data-cell.editing { padding: 0; }
  .data-cell input { width: 100%; height: 100%; background: var(--input-bg); color: var(--input-fg);
                     border: 1px solid var(--btn-active-bg); font-family: monospace;
                     font-size: 12px; text-align: right; padding: 0 4px; }
  .data-cell select { width: 100%; height: 100%; background: var(--input-bg); color: var(--input-fg);
                      border: 1px solid var(--btn-active-bg); font-family: monospace;
                      font-size: 12px; padding: 0 2px; }
  .data-cell.edit-ok { outline: 1px solid #4caf50; }
  .data-cell.edit-err { outline: 1px solid #f44336; }

  /* ── DateTime Calendar Picker ─────────────────────────────────────────── */
  #dt-picker-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
  }
  #dt-picker-overlay.open { display: block; }
  #dt-picker {
    position: absolute;
    z-index: 101;
    width: 280px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    font-family: var(--vscode-font-family, sans-serif);
    font-size: 12px;
    color: var(--cell-fg);
    overflow: hidden;
    user-select: none;
  }
  /* Header: nav arrows + month/year */
  .dtp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }
  .dtp-nav {
    width: 26px; height: 26px;
    border: none; border-radius: 4px;
    background: transparent;
    color: var(--cell-fg);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .dtp-nav:hover { background: var(--btn-bg); }
  .dtp-title {
    display: flex; align-items: center; gap: 4px;
    font-weight: 600; font-size: 13px;
  }
  .dtp-title select {
    background: var(--input-bg); color: var(--input-fg);
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 12px; padding: 1px 2px; cursor: pointer;
  }
  .dtp-title input[type="number"] {
    background: var(--input-bg); color: var(--input-fg);
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 12px; width: 56px; text-align: center; padding: 1px 2px;
    -moz-appearance: textfield;
  }
  .dtp-title input[type="number"]::-webkit-inner-spin-button,
  .dtp-title input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  /* Weekday labels */
  .dtp-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    padding: 4px 6px 2px;
    font-size: 10px;
    color: var(--index-bg);
    font-weight: 600;
  }
  /* Day grid */
  .dtp-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 2px 6px 6px;
  }
  .dtp-day {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 4px;
    background: transparent;
    color: var(--cell-fg);
    font-size: 12px;
    cursor: pointer;
  }
  .dtp-day:hover { background: var(--btn-bg); }
  .dtp-day.other-month { color: var(--index-bg); opacity: 0.5; }
  .dtp-day.selected {
    background: var(--btn-active-bg);
    color: var(--btn-active-fg);
    font-weight: 700;
  }
  .dtp-day.today {
    outline: 1px solid var(--btn-active-bg);
    outline-offset: -1px;
  }
  /* Time row */
  .dtp-time {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    background: var(--header-bg);
  }
  .dtp-time label { font-size: 11px; color: var(--index-bg); margin-right: 2px; }
  .dtp-time-input {
    width: 38px; text-align: center;
    background: var(--input-bg); color: var(--input-fg);
    border: 1px solid var(--border); border-radius: 3px;
    font-size: 12px; font-family: monospace;
    padding: 2px 2px;
  }
  .dtp-time-sep { color: var(--index-bg); font-weight: 700; font-size: 13px; }
  .dtp-time-unit { font-size: 11px; color: var(--muted); margin-right: 4px; }
  /* iso text input */
  .dtp-iso-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-top: 1px solid var(--border);

<script>
(function () {
  const vscode = acquireVsCodeApi();

  // ── Config ──────────────────────────────────────────────────────────────
  const TILE_ROWS = 50;
  const TILE_COLS = 50;
  const BUFFER_TILE_SPAN = 3;

  const ROW_H = 22;
  let COL_W = 96;
  const COL_W_DEFAULT = 96;
  const COL_W_DATETIME = 150;
  let IDX_COL_W = 56;
  const IDX_COL_W_DEFAULT = 56;
  const IDX_COL_W_DATAFRAME = 80;
  const IDX_ROW_H = 22;
  const DISPLAY_DECIMALS = 5;
  const SCROLL_SETTLE_MS = 160;
  const CHUNK_RANGE_UPDATE_MS = 60;

  // ── State ────────────────────────────────────────────────────────────────
  let currentExpression = '';
  let meta = null;
  let colorMode = 'range';
  let colorMin = null;
  let colorMax = null;
  let isBoolDtype = false;
  let isDatetimeDtype = false;
  let dtUnit = 'ns'; // datetime64 unit: ns, us, ms, s, etc.
  let dimIndices = [];       // always [] now; slice indices live in the expression itself
  let baseShape = null;      // shape of the base expression when ndim>2 auto-conversion happened
  let viewR0 = 0;
  let viewC0 = 0;
  let visRows = 1;
  let visCols = 1;
  let is1D = false;
  let isDataFrame = false;
  let dfColLabels = null;      // array of column name strings for DataFrames
  let dfRowLabels = new Map(); // r -> label string for DataFrames
  let currentBufferKeys = new Set();
  let viewerMode = 'data';
  let currentInspect = null;

  const TREE_PAGE_SIZE = 100;
  let treeNodes = new Map();
  let treeRootId = null;
  let stickyScopes = new WeakMap(); // sticky row element → scope-end row element
  let stickyNaturalTops = new WeakMap(); // row element → natural top position in px
  let nodeCounter = 0;
  let includePrivateRoot = false;

  const scalarReqMap = new Map();

  const chunkCache = new Map();
  const pendingChunks = new Set();

  let bufferTileR0 = 0;
  let bufferTileC0 = 0;
  let scrollRafPending = false;
  let syncingScroll = false;
  let visibleRangeTimer = null;
  let scrollingActive = false;

  // ── History ──────────────────────────────────────────────────────────────
  let history = [];
  let historyIdx = -1;
  let navigatingHistory = false;
  const recentExpressions = [];
  const MAX_RECENT_EXPRESSIONS = 15;

  function otherRecentExpressions() {
    return recentExpressions.filter(expr => expr !== currentExpression);
  }

  function closeRecentExpressionsMenu() {
    document.getElementById('expr-history-menu').classList.remove('open');
  }

  function updateRecentExpressionsDropdown() {
    const wrap = document.getElementById('expr-input-wrap');
    const menu = document.getElementById('expr-history-menu');
    const others = otherRecentExpressions();

    wrap.classList.toggle('has-history', others.length > 0);
    if (others.length === 0) {
      closeRecentExpressionsMenu();
    }

    menu.innerHTML = '';
    others.forEach((expr) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'expr-history-item';
      item.textContent = expr;
      item.title = expr;
      item.addEventListener('click', () => {
        baseShape = null;
        addrInput.value = expr;
        navigateToExpression(expr, false);
        rememberRecentExpression(expr);
        closeRecentExpressionsMenu();
      });
      menu.appendChild(item);
    });
  }

  function rememberRecentExpression(expression) {
    const expr = (expression || '').trim();
    if (!expr) return;
    const idx = recentExpressions.indexOf(expr);
    if (idx >= 0) recentExpressions.splice(idx, 1);
    recentExpressions.unshift(expr);
    if (recentExpressions.length > MAX_RECENT_EXPRESSIONS) {
      recentExpressions.length = MAX_RECENT_EXPRESSIONS;
    }
    updateRecentExpressionsDropdown();
  }

  function updateCurrentHistoryState() {
      if (historyIdx >= 0 && historyIdx < history.length) {
          const entry = history[historyIdx];
          entry.r0 = viewR0 || 0;
          entry.c0 = viewC0 || 0;
          entry.mode = viewerMode;
          entry.includePrivateRoot = includePrivateRoot;
          entry.treeNodes = new Map(treeNodes);
          entry.treeRootId = treeRootId;
          entry.inspect = currentInspect;
          entry.meta = meta;
          entry.treeScrollTop = document.getElementById('tree-host').scrollTop;
          entry.gridScrollTop = document.getElementById('scroll-host').scrollTop;
      }
  }

  function navigateToExpression(expr, isAutoSlice = false, initialR0 = 0, initialC0 = 0) {
      expr = (expr || '').trim();
      if (!isAutoSlice) updateCurrentHistoryState();

      if (!isAutoSlice && historyIdx >= 0 && historyIdx < history.length - 1) {
          // Branching from the past -> duplicate current into the end history stack
          const currentEntry = history[historyIdx];
          history.push(Object.assign({}, currentEntry));
      }

      const newEntry = {
          expression: expr, r0: initialR0, c0: initialC0,
          mode: viewerMode, includePrivateRoot: false, treeNodes: null, treeRootId: null, inspect: null, meta: null
      };

      if (isAutoSlice && historyIdx === history.length - 1 && history.length > 0) {
          // Automatic slice override top history
          history[history.length - 1] = newEntry;
      } else {
          history.push(newEntry);
          historyIdx = history.length - 1;
      }
      updateNavButtons();

      addrInput.value = expr;
      doLoadExpression(expr, initialR0, initialC0);
  }

  function restoreHistoryEntry(idx) {
      navigatingHistory = true;
      try {
          const entry = history[idx];
        const targetMode = entry.mode === 'object' ? 'object' : 'data';
        setMode(targetMode);
        includePrivateRoot = !!entry.includePrivateRoot;

        if (entry.treeNodes && entry.treeRootId) {
              currentExpression = entry.expression;
              addrInput.value = currentExpression;
              viewR0 = entry.r0 || 0; viewC0 = entry.c0 || 0;
              treeNodes = new Map(entry.treeNodes);
              treeRootId = entry.treeRootId;
              currentInspect = entry.inspect || null;
              // Restore nodeCounter past the highest existing node ID to prevent new nodes
              // from overwriting existing ones (e.g. the root) when expanding after going back.
              nodeCounter = 0;
              for (const key of treeNodes.keys()) {
                  const m = key.match(/^node_(\d+)$/);
                  if (m) nodeCounter = Math.max(nodeCounter, parseInt(m[1]));
              }
              setHostVisibility('tree');
              setInfoLabelFromInspect(currentInspect);
              renderTree();
              if (entry.treeScrollTop) {
                  requestAnimationFrame(() => {
                      document.getElementById('tree-host').scrollTop = entry.treeScrollTop;
                  });
              }
              } else if (entry.meta) {
              currentExpression = entry.expression;
              addrInput.value = currentExpression;
              viewR0 = entry.r0 || 0; viewC0 = entry.c0 || 0;
              meta = entry.meta;
              setHostVisibility('grid');
              setRangeInfo(meta.shape, null);
              if (entry.gridScrollTop) {
                  requestAnimationFrame(() => {
                      document.getElementById('scroll-host').scrollTop = entry.gridScrollTop;
                  });
              }
              vscode.postMessage({ type: 'requestMeta', expression: currentExpression, mode: viewerMode });
              } else if (entry.inspect && entry.inspect.is_editable_scalar) {
              currentExpression = entry.expression;
              addrInput.value = currentExpression;
              renderScalarEditor(entry.inspect);
              setInfoLabelFromInspect(entry.inspect);
          } else {
              addrInput.value = entry.expression;
              doLoadExpression(entry.expression, entry.r0, entry.c0);
          }
      } finally {
          navigatingHistory = false;
          updateNavButtons();
      }
  }

  function updateNavButtons() {
    document.getElementById('btn-back').disabled = historyIdx <= 0;
    document.getElementById('btn-forward').disabled = historyIdx < 0 || historyIdx >= history.length - 1;
  }

  // ── Viridis LUT ─────────────────────────────────────────────────────────
  const VIRIDIS = (function() {
    const stops = [
      [68,1,84],[72,20,103],[79,42,121],[81,63,135],[84,84,139],[85,104,143],
      [86,122,146],[87,139,149],[88,156,150],[89,173,148],[93,188,143],[100,203,135],
      [113,215,125],[128,225,111],[148,232,93],[172,237,72],[198,239,52],[224,238,35],
      [253,231,37]
    ];
    const lut = [];
    for (let i = 0; i < 256; i++) {
      const t = i / 255 * (stops.length - 1);
      const lo = Math.floor(t), hi = Math.min(stops.length - 1, lo + 1);
      const f = t - lo;
      lut.push(`rgb(${Math.round(stops[lo][0]+f*(stops[hi][0]-stops[lo][0]))},${Math.round(stops[lo][1]+f*(stops[hi][1]-stops[lo][1]))},${Math.round(stops[lo][2]+f*(stops[hi][2]-stops[lo][2]))})`);
    }
    return lut;
  })();

  function valueToColor(v) {
    if (typeof v !== 'number' || isNaN(v) || !isFinite(v)) return '';
    if (colorMin === null || colorMax === null) return '';
    if (colorMode === 'none') return '';
    if (colorMode === 'sym') {
      const extreme = Math.max(Math.abs(colorMin), Math.abs(colorMax));
      if (extreme === 0) return '';
      const t = v / extreme;
      if (t >= 0) {
        const l = Math.round(100 - 40 * Math.min(1, t));
        return symLightnessToRgb(0, l);
      }
      const l = Math.round(100 + 40 * Math.max(-1, t));
      return symLightnessToRgb(220, l);
    }
    if (colorMode === 'range') {
      if (colorMax === colorMin) return VIRIDIS[127];
      return VIRIDIS[Math.max(0, Math.min(255, Math.round((v - colorMin) / (colorMax - colorMin) * 255)))];
    }
    return '';
  }

  function needsDarkText(cssColor) {
    if (!cssColor) return false;
    const rgbMatch = cssColor.match(/rgb\((\d+),(\d+),(\d+)\)/i);
    if (!rgbMatch) return false;
    const mean = (+rgbMatch[1] + +rgbMatch[2] + +rgbMatch[3]) / 3;
    return mean > 128;
  }

  function symLightnessToRgb(hue, lightnessPct) {
    const sat = 0.9;
    const l = Math.max(0, Math.min(1, lightnessPct / 100));
    const c = (1 - Math.abs(2 * l - 1)) * sat;
    const hh = ((hue % 360) + 360) % 360 / 60;
    const x = c * (1 - Math.abs(hh % 2 - 1));
    let r1 = 0, g1 = 0, b1 = 0;

    if (hh >= 0 && hh < 1) { r1 = c; g1 = x; }
    else if (hh < 2) { r1 = x; g1 = c; }
    else if (hh < 3) { g1 = c; b1 = x; }
    else if (hh < 4) { g1 = x; b1 = c; }
    else if (hh < 5) { r1 = x; b1 = c; }
    else { r1 = c; b1 = x; }

    const m = l - c / 2;
    const r = Math.round((r1 + m) * 255);
    const g = Math.round((g1 + m) * 255);
    const b = Math.round((b1 + m) * 255);
    return `rgb(${r},${g},${b})`;
  }

  function refreshColorSwatches() {
    // No-op for simplistic SVG buttons
  }

  function formatNumber(v) {
    if (!Number.isFinite(v)) return String(v);
    if (Number.isInteger(v)) return String(v);
    return v.toFixed(DISPLAY_DECIMALS);
  }
  // ── Slice-suffix helpers ───────────────────────────────────────────────
  function isSimpleIdentifier(s) {
    return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s.trim());
  }

  // Returns the index of the '[' that opens the last [...] at the end of expr, or -1.
  function findSliceSuffixStart(expr) {
    if (!expr.endsWith(']')) return -1;
    let depth = 0;
    for (let i = expr.length - 1; i >= 0; i--) {
      if (expr[i] === ']') depth++;
      else if (expr[i] === '[') { depth--; if (depth === 0) return i; }
    }
    return -1;
  }

  // Builds e.g. A[(0),(1),:,:]  or  (complex)[(0),(1),:,:]
  function buildSlicedExpression(base, indices) {
    const b = base.trim();
    let wrapped;
    if (isSimpleIdentifier(b) || (b.startsWith('(') && b.endsWith(')'))) {
      wrapped = b;
    } else {
      wrapped = `(${b})`;
    }
    const parts = [...indices.map(i => `(${i})`), ':', ':'];
    return `${wrapped}[${parts.join(',')}]`;
  }

  // Rebuilds the slice-index up/down buttons based on the number of (integer) patterns
  // found inside the [...] suffix of the current addr-input value.
  function updateSliceButtons() {
    const expr = addrInput.value;
    const suffixStart = findSliceSuffixStart(expr);
    let numDims = 0;
    if (suffixStart >= 0) {
      const sliceContent = expr.slice(suffixStart + 1, -1);
      const matches = sliceContent.match(/\(\d+\)/g);
      numDims = matches ? matches.length : 0;
    }
    const container = document.getElementById('slice-btns');
    if (container.children.length === numDims) return; // nothing changed
    container.innerHTML = '';
    for (let d = 0; d < numDims; d++) {
      const pair = document.createElement('div');
      pair.className = 'slice-btn-pair';
      const up = document.createElement('button');
      up.className = 'slice-btn'; up.dataset.dim = d; up.dataset.dir = '1';
      up.textContent = '\u25b2'; up.title = `Increment index of extra dim ${d}`;
      const dn = document.createElement('button');
      dn.className = 'slice-btn'; dn.dataset.dim = d; dn.dataset.dir = '-1';
      dn.textContent = '\u25bc'; dn.title = `Decrement index of extra dim ${d}`;
      pair.appendChild(up); pair.appendChild(dn);
      container.appendChild(pair);
    }
  }

  function setMode(mode) {
    viewerMode = mode === 'object' ? 'object' : 'data';
    document.getElementById('mode-data').classList.toggle('active', viewerMode === 'data');
    document.getElementById('mode-object').classList.toggle('active', viewerMode === 'object');
  }

  function setHostVisibility(mode) {
    const grid = document.getElementById('scroll-host');
    const tree = document.getElementById('tree-host');
    const scalar = document.getElementById('scalar-host');
    const functionHost = document.getElementById('function-host');
    const colorBtns = document.getElementById('color-btns');
    const rangeInfo = document.getElementById('range-info');
    const sliceBtns = document.getElementById('slice-btns');

    grid.style.display = mode === 'grid' ? 'block' : 'none';
    tree.style.display = mode === 'tree' ? 'block' : 'none';
    scalar.style.display = mode === 'scalar' ? 'flex' : 'none';
    functionHost.style.display = mode === 'function' ? 'flex' : 'none';

    const arrayControlsVisible = mode === 'grid';
    colorBtns.style.display = arrayControlsVisible ? 'inline-flex' : 'none';
    rangeInfo.style.display = arrayControlsVisible ? 'inline' : 'none';
    sliceBtns.style.display = arrayControlsVisible ? 'flex' : 'none';
  }

  function resetTreeState() {
    treeNodes.clear();
    treeRootId = null;
    nodeCounter = 0;
    includePrivateRoot = false;
    document.getElementById('tree-host').innerHTML = '';
  }

  function nextNodeId() {
    nodeCounter += 1;
    return `node_${nodeCounter}`;
  }

  function combineExpression(baseExpr, accessor) {
    if (!accessor) return null;
    if (!baseExpr) {
      return accessor.startsWith('.') ? accessor.slice(1) : accessor;
    }
    return `${baseExpr}${accessor}`;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function highlightPython(rawCode) {
    let code = escapeHtml(rawCode);
    const ph = [];
    const protect = s => { const i = ph.length; ph.push(s); return `\x00${i}\x00`; };

    // Triple-quoted strings
    code = code.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, m => protect(`<span class="py-str">${m}</span>`));
    // Single-line strings
    code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m => protect(`<span class="py-str">${m}</span>`));
    // Comments
    code = code.replace(/(#[^\n]*)/g, m => protect(`<span class="py-comment">${m}</span>`));
    // Doctest / REPL prompts (after HTML escape >>> becomes &gt;&gt;&gt;)
    code = code.replace(/((?:^|\n)[ \t]*)(&gt;&gt;&gt;|\.\.\.)/g,
      (_, pre, prompt) => `${pre}${protect(`<span class="py-prompt">${prompt}</span>`)}`);
    // Keywords
    code = code.replace(/\b(False|None|True|and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield)\b/g,
      m => protect(`<span class="py-kw">${m}</span>`));
    // Numbers
    code = code.replace(/\b(\d+\.?\d*(?:[eE][+-]?\d+)?j?)\b/g, m => protect(`<span class="py-num">${m}</span>`));

    // Restore placeholders
    return code.replace(/\x00(\d+)\x00/g, (_, i) => ph[+i]);
  }

  function inlineMd(s) {
    // s is already HTML-escaped
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function renderMarkdown(mdText) {
    if (!mdText) return '';
    const lines = mdText.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();

      // Fenced code block
      if (line.startsWith('```')) {
        const lang = line.slice(3).trim().toLowerCase();
        i++;
        const codeLines = [];
        while (i < lines.length && !lines[i].startsWith('```')) { codeLines.push(lines[i]); i++; }
        i++; // skip closing ```
        const isPy = lang === 'python' || lang === 'py' || lang === '';
        const body = isPy ? highlightPython(codeLines.join('\n')) : escapeHtml(codeLines.join('\n'));
        html += `<pre class="code-block"><code>${body}</code></pre>`;
        continue;
      }

      // NumPy-style section header: text followed by a line of dashes/equals
      if (trimmed && i + 1 < lines.length && /^[-=]{2,}\s*$/.test(lines[i + 1])) {
        html += `<div class="doc-section">${escapeHtml(trimmed)}</div>`;
        i += 2;
        continue;
      }

      // Doctest block (lines starting with >>> or ...)
      if (/^\s*(>>>|\.\.\.)/.test(line)) {
        const codeLines = [];
        while (i < lines.length && /^\s*(>>>|\.\.\.)/.test(lines[i])) { codeLines.push(lines[i]); i++; }
        html += `<pre class="code-block doctest"><code>${highlightPython(codeLines.join('\n'))}</code></pre>`;
        continue;
      }

      // Empty line – just skip
      if (!trimmed) { i++; continue; }

      // Regular text paragraph
      const paraLines = [];
      while (i < lines.length) {
        const l = lines[i], t = l.trim();
        if (!t) break;
        if (l.startsWith('```')) break;
        if (/^\s*(>>>|\.\.\.)/.test(l)) break;
        if (t && i + 1 < lines.length && /^[-=]{2,}\s*$/.test(lines[i + 1])) break;
        paraLines.push(inlineMd(escapeHtml(l)));
        i++;
      }
      if (paraLines.length > 0) html += `<p>${paraLines.join('<br>')}</p>`;
    }

    return html;
  }

  function renderFunctionView(inspect) {
    const host = document.getElementById('function-host');
    const paramEl = document.getElementById('function-params');
    const docEl = document.getElementById('function-doc');

    const funcName = currentExpression ? currentExpression.split('.').pop() : 'function';
    paramEl.textContent = `def ${funcName}${inspect.func_params || '()'}:`;

    if (inspect.func_doc_html) {
      docEl.innerHTML = inspect.func_doc_html;
      docEl.style.display = 'block';
    } else if (inspect.func_doc) {
      docEl.innerHTML = renderMarkdown(inspect.func_doc);
      docEl.style.display = 'block';
    } else {
      docEl.innerHTML = '<em>No docstring available.</em>';
    }

    setHostVisibility('function');
  }

  function setInfoLabelFromInspect(inspect) {
    const info = document.getElementById('info-label');
    if (!inspect) {
      info.textContent = '—';
      return;
    }
    const parts = [inspect.type || 'unknown'];
    if (inspect.dtype) parts.push(inspect.dtype);
    if (inspect.shape) parts.push(inspect.shape.replace(/[()]/g, '').replace(/,\s*$/, '').replace(/,\s*/g, ' × '));
    if (inspect.type === 'globals' && typeof inspect.total_count === 'number') {
      const n = inspect.total_count;
      parts.push(`(${n} variable${n === 1 ? '' : 's'})`);
    } else if (viewerMode === 'object' && typeof inspect.total_count === 'number') {
      parts.push(`(${inspect.total_count} attributes)`);
    } else if (viewerMode === 'data' && inspect.is_object_fallback && typeof inspect.total_count === 'number') {
      const n = inspect.total_count;
      parts.push(`(${n} attribute${n === 1 ? '' : 's'})`);
    } else if (viewerMode === 'data') {
      if (inspect.type === 'str' && typeof inspect.str_value === 'string') {
        const n = inspect.str_value.length;
        parts.push(`(${n} character${n === 1 ? '' : 's'})`);
      } else if ((inspect.type === 'bytes' || inspect.type === 'bytearray') && typeof inspect.total_count === 'number') {
        const n = inspect.total_count;
        parts.push(`(${n} byte${n === 1 ? '' : 's'})`);
      } else if ((inspect.type === 'dict' || inspect.type === 'list') && typeof inspect.total_count === 'number') {
        const n = inspect.total_count;
        parts.push(`(${n} item${n === 1 ? '' : 's'})`);
      } else if (typeof inspect.total_count === 'number' && inspect.is_container) {
        const n = inspect.total_count;
        parts.push(`(${n} item${n === 1 ? '' : 's'})`);
      }
    }
    info.textContent = parts.join('  ');
  }

  // ── Scalar DateTime Picker ────────────────────────────────────────────
  // Types that should show the date picker
  const SCALAR_DATETIME_TYPES = new Set(['datetime', 'datetime64', 'Timestamp']);
  // Types that include a time component
  const SCALAR_DATETIME_WITH_TIME = new Set(['datetime', 'datetime64', 'Timestamp', 'time']);
  // Types that are date-only
  const SCALAR_DATE_ONLY_TYPES = new Set(['date']);

  let sdtpState = null; // { type, hasTime }

  function isScalarDatetimeType(inspect) {
    if (!inspect) return false;
    if (SCALAR_DATETIME_TYPES.has(inspect.type) || SCALAR_DATE_ONLY_TYPES.has(inspect.type)) return true;
    if (inspect.type === 'datetime64') return true;
    // detect by edit_hint
    if (inspect.edit_hint && /ISO.*date/i.test(inspect.edit_hint)) return true;
    return false;
  }

  function sdtpParseFromInput() {
    const raw = document.getElementById('scalar-input').value.trim();
    // Try direct Date parse
    const d = new Date(raw);
    if (!isNaN(d.getTime())) return d;
    // Try space-separated: "2023-01-15 14:30:00"
    const d2 = new Date(raw.replace(' ', 'T'));
    if (!isNaN(d2.getTime())) return d2;
    return null;
  }

  function sdtpBuildIso(d, hasTime) {
    const dateStr = d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
    if (!hasTime) return dateStr;
    return dateStr + 'T' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0') + ':' +
      String(d.getSeconds()).padStart(2,'0');
  }

  function sdtpSyncToInput() {
    if (!sdtpState) return;
    const d = new Date(
      parseInt(document.getElementById('sdtp-year').value) || 2000,
      parseInt(document.getElementById('sdtp-month').value) || 0,
      sdtpState.selDay,
      parseInt(document.getElementById('sdtp-hour').value) || 0,
      parseInt(document.getElementById('sdtp-min').value) || 0,
      parseInt(document.getElementById('sdtp-sec').value) || 0
    );
    document.getElementById('scalar-input').value = sdtpBuildIso(d, sdtpState.hasTime);
    document.getElementById('scalar-input').classList.add('changed');
  }

  function sdtpSyncFromInput() {
    const d = sdtpParseFromInput();
    if (!d) return;
    sdtpState.selDay = d.getDate();
    document.getElementById('sdtp-month').value = d.getMonth();
    document.getElementById('sdtp-year').value = d.getFullYear();
    document.getElementById('sdtp-hour').value = String(d.getHours()).padStart(2, '0');
    document.getElementById('sdtp-min').value = String(d.getMinutes()).padStart(2, '0');
    document.getElementById('sdtp-sec').value = String(d.getSeconds()).padStart(2, '0');
    renderSdtpDays();
  }

  function renderSdtpDays() {
    if (!sdtpState) return;
    const selYear = parseInt(document.getElementById('sdtp-year').value) || 2000;
    const selMonth = parseInt(document.getElementById('sdtp-month').value) || 0;
    const selDay = sdtpState.selDay;

    const container = document.getElementById('sdtp-days');
    container.innerHTML = '';
    const firstDay = new Date(selYear, selMonth, 1);
    let startWd = (firstDay.getDay() + 6) % 7;
    const daysInMonth = new Date(selYear, selMonth + 1, 0).getDate();
    const prevMonthDays = new Date(selYear, selMonth, 0).getDate();

    const today = new Date();
    const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

    for (let i = startWd - 1; i >= 0; i--) {
      const day = prevMonthDays - i;
      const btn = document.createElement('button');
      btn.className = 'dtp-day other-month'; btn.textContent = day;
      btn.type = 'button';
      btn.addEventListener('click', () => {
        let m = selMonth - 1, y = selYear;
        if (m < 0) { m = 11; y--; }
        document.getElementById('sdtp-month').value = m;
        document.getElementById('sdtp-year').value = y;
        sdtpState.selDay = day;
        renderSdtpDays(); sdtpSyncToInput();
      });
      container.appendChild(btn);
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const btn = document.createElement('button');
      btn.className = 'dtp-day'; btn.type = 'button';
      if (day === selDay) btn.classList.add('selected');
      if (selYear === todayY && selMonth === todayM && day === todayD) btn.classList.add('today');
      btn.textContent = day;
      btn.addEventListener('click', () => {
        sdtpState.selDay = day;
        renderSdtpDays(); sdtpSyncToInput();
      });
      container.appendChild(btn);
    }
    const remaining = (7 - ((startWd + daysInMonth) % 7)) % 7;
    for (let day = 1; day <= remaining; day++) {
      const btn = document.createElement('button');
      btn.className = 'dtp-day other-month'; btn.type = 'button'; btn.textContent = day;
      btn.addEventListener('click', () => {
        let m = selMonth + 1, y = selYear;
        if (m > 11) { m = 0; y++; }
        document.getElementById('sdtp-month').value = m;
        document.getElementById('sdtp-year').value = y;
        sdtpState.selDay = day;
        renderSdtpDays(); sdtpSyncToInput();
      });
      container.appendChild(btn);
    }
  }

  function showScalarDatetimePicker(inspect) {
    const d = sdtpParseFromInput() || new Date();
    const hasTime = !SCALAR_DATE_ONLY_TYPES.has(inspect.type);
    sdtpState = { selDay: d.getDate(), hasTime };

    // Populate month select
    const monthSel = document.getElementById('sdtp-month');
    if (!monthSel.options.length) {
      DT_MONTHS.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = m;
        monthSel.appendChild(opt);
      });
    }
    monthSel.value = d.getMonth();
    document.getElementById('sdtp-year').value = d.getFullYear();
    document.getElementById('sdtp-hour').value = String(d.getHours()).padStart(2, '0');
    document.getElementById('sdtp-min').value = String(d.getMinutes()).padStart(2, '0');
    document.getElementById('sdtp-sec').value = String(d.getSeconds()).padStart(2, '0');
    document.getElementById('sdtp-time-row').style.display = hasTime ? 'flex' : 'none';
    renderSdtpDays();

    document.getElementById('scalar-dt-picker').style.display = 'block';
  }

  function hideScalarDatetimePicker() {
    document.getElementById('scalar-dt-picker').style.display = 'none';
    sdtpState = null;
  }

  // Scalar picker nav buttons
  document.getElementById('sdtp-prev-month').addEventListener('click', () => {
    if (!sdtpState) return;
    let m = parseInt(document.getElementById('sdtp-month').value) - 1;
    let y = parseInt(document.getElementById('sdtp-year').value);
    if (m < 0) { m = 11; y--; }
    document.getElementById('sdtp-month').value = m;
    document.getElementById('sdtp-year').value = y;
    renderSdtpDays(); sdtpSyncToInput();
  });
  document.getElementById('sdtp-next-month').addEventListener('click', () => {
    if (!sdtpState) return;
    let m = parseInt(document.getElementById('sdtp-month').value) + 1;
    let y = parseInt(document.getElementById('sdtp-year').value);
    if (m > 11) { m = 0; y++; }
    document.getElementById('sdtp-month').value = m;
    document.getElementById('sdtp-year').value = y;
    renderSdtpDays(); sdtpSyncToInput();
  });
  document.getElementById('sdtp-month').addEventListener('change', () => {
    if (!sdtpState) return;
    renderSdtpDays(); sdtpSyncToInput();
  });
  document.getElementById('sdtp-year').addEventListener('change', () => {

  });
  ['sdtp-hour', 'sdtp-min', 'sdtp-sec'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
